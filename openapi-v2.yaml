              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '200':
          description: The renamed document summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '404': { description: DOCUMENT_NOT_FOUND. }
        '409': { description: DOCUMENT_PATH_TAKEN. }
  /tables:
    get:
      tags: [Workspace]
      summary: List tables (cursor-paginated; ?workspaceId=)
      operationId: listTables
      x-mint:
        href: /agents/reference/list-tables
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: workspaceId
          description: Scope the list to one workspace.
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: A page of TableObjects in the canonical list envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Table' }
  /tables/{tableId}/columns:
    parameters:
      - $ref: '#/components/parameters/TableId'
    get:
      tags: [Workspace]
      summary: List a table's columns
      operationId: listColumns
      x-mint:
        href: /agents/reference/list-columns
      responses:
        '200':
          description: |
            Column objects in the canonical list envelope. Not paginated —
            `nextCursor` is always `null`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/WorkspaceColumn' }
        '404': { description: TABLE_NOT_FOUND. }
  /tables/{tableId}/rows:
    parameters:
      - $ref: '#/components/parameters/TableId'
    get:
      tags: [Workspace]
      summary: List rows (typed cells; ?cells=flat / ?format=csv)
      description: |
        Returns Row objects (`{ object: "row", id, cells }`) with polymorphic
        typed cells by default (`scalar` / `value` (+run) / `sequence`), in
        the canonical list envelope **plus `total`** (the filtered row count
        for the query's scope). `?cells=flat` returns the v1-style
        `{ slug: value }` rows (deliberately unstamped); `?format=csv`
        streams CSV. Supports slug-keyed `filters` / `sort` JSON and cursor
        pagination — this endpoint allows `limit` up to **200**.
      operationId: listRows
      x-mint:
        href: /agents/reference/list-rows
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - in: query
          name: limit
          description: Max rows to return. Default 50; rows allow up to 200 (vs. 100 elsewhere).
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: filters
          description: |
            JSON array of `{ column, operator, value }` filters. `column` is
            an input-column slug; operators: `contains`, `not_contains`,
            `equals`, `not_equals`, `is_empty`, `is_not_empty`,
            `greater_than`, `greater_than_or_equal`, `less_than`,
            `less_than_or_equal`. Unknown columns → `UNKNOWN_COLUMN`.
          schema: { type: string }
        - in: query
          name: sort
          description: 'JSON object `{ column, direction: "asc"|"desc" }` (slug-keyed).'
          schema: { type: string }
        - in: query
          name: cells
          description: 'Pass `flat` for v1-style `{ slug: value }` rows instead of typed cells.'
          schema: { type: string, enum: [flat] }
        - in: query
          name: format
          description: Pass `csv` to stream the (flat) rows as CSV.
          schema: { type: string, enum: [csv] }
        - in: query
          name: defaults
          description: Pass `false` to disable the table's default filters/sort.
          schema: { type: string, enum: ['true', 'false'] }
      responses:
        '200':
          description: A page of rows (list envelope + `total`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items, total]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Row' }
                      total:
                        type: integer
                        description: Total row count for the query's scope (all pages).
            text/csv:
              schema: { type: string }
        '400': { description: 'INVALID_FILTERS / INVALID_SORT / UNKNOWN_COLUMN / VALIDATION_ERROR.' }
        '404': { description: TABLE_NOT_FOUND. }
    delete:
      tags: [Workspace]
      summary: Bulk soft-delete rows by id
      description: |
        Soft-deletes the given rows (up to **100** per call). Each row and its
        cells / cell_runs / active sequences cascade off. Ids that don't belong
        to this table/org, or are already deleted, are skipped — so `deleted`
        may be less than `requested` (an idempotent re-delete returns
        `deleted: 0`). Deleted rows are recoverable via the app's restore flow.
      operationId: deleteRows
      x-mint:
        href: /agents/reference/delete-rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rowIds]
              properties:
                rowIds:
                  type: array
                  items: { type: string, format: uuid }
                  minItems: 1
                  maxItems: 100
      responses:
        '200':
          description: Delete receipt.
          content:
            application/json:
              schema:
                type: object
                required: [deleted, requested]
                properties:
                  deleted:
                    type: integer
                    description: Rows actually soft-deleted (live rows in this table + org that matched).
                  requested:
                    type: integer
                    description: Row ids submitted (raw count, before de-duplication).
              example:
                deleted: 2
                requested: 2
        '400': { description: VALIDATION_ERROR (rowIds empty, non-UUID, or over 100). }
        '404': { description: TABLE_NOT_FOUND. }
  /tables/{tableId}/rows/upsert:
    parameters:
      - $ref: '#/components/parameters/TableId'
    post:
      tags: [Workspace]
      summary: Upsert rows on matchColumns (the single v2 batch write primitive)
      description: |
        v2's one row-write endpoint — there is no bare per-row insert (an
        insert-only call is just an upsert whose rows match nothing). All writes
        go through `api_batches` and are idempotent per `batchId`.

        Rows matching an existing row on **every** `matchColumns` value update
        that row's input cells; non-matching rows insert. Per-row
        `inserted`/`updated`/`skipped` outcomes are recorded on the batch.

        - Row keys and `matchColumns` are **input column slugs** (from
          `GET /tables/{tableId}/columns` → `columns[].slug`), never display
          names. A non-slug row key → `UNKNOWN_FIELDS`.
        - `matchColumns` (required) must be real input columns (`UNKNOWN_COLUMN`)
          and every match value must be present + non-empty on every row
          (`MISSING_MATCH_VALUE`).
        - Duplicate request keys → `DUPLICATE_MATCH_KEY`; multiple existing rows
          match one key → `AMBIGUOUS_MATCH` (409).
        - `enrich` (default true) enriches freshly **inserted** rows.
        - `reenrichUpdated` (default false) — set true to also re-run enrichment
          on rows the upsert **updated** (re-spends credits); off by default so an
          upsert never silently re-enriches matched rows.

        Only `input`-kind columns are writable. Enrichment, score, and
        **sequence** columns are populated automatically — sequences are
        agent/column-generated only (see `POST /tables/{tableId}/campaigns`),
        never set via this endpoint; passing one returns `NON_INPUT_COLUMNS`.

        The response references the tracking object by id: it is an
        `enrichment_run` the caller polls via `GET /enrichment-runs/{runId}`.
      operationId: upsertRows
      x-mint:
        href: /agents/reference/upsert-rows
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rows, matchColumns]
              properties:
                rows: { type: array, items: { type: object, additionalProperties: true }, minItems: 1, maxItems: 100 }
                matchColumns: { type: array, items: { type: string }, minItems: 1 }
                enrich: { type: boolean, default: true }
                reenrichUpdated: { type: boolean, default: false }
                batchId: { type: string, format: uuid }
      responses:
        '201':
          description: The upsert receipt — an `enrichment_run` reference with per-outcome counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertReceipt' }
        '200':
          description: Idempotent replay of an existing `batchId` (same receipt shape).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertReceipt' }
  /tables/{tableId}/rows/upsert-file:
    parameters:
      - $ref: '#/components/parameters/TableId'
    post:
      tags: [Workspace]
      summary: Upsert rows from a CSV file (same operation, CSV transport)
      description: |
        The CSV transport for `POST /tables/{tableId}/rows/upsert`: `content`
        is a base64-encoded CSV whose headers are input-column slugs (the same
        keys as JSON upsert rows) with one record per data row. Identical
        match/enrich semantics, identical per-`batchId` idempotency, identical
        row cap — a CSV with more than **100** data rows is rejected with
        `413 TOO_MANY_ROWS` (split the file or page the JSON upsert).
      operationId: upsertRowsFromFile
      x-mint:
        href: /agents/reference/upsert-rows-file
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, matchColumns]
              properties:
                content:
                  type: string
                  description: Base64-encoded CSV. Headers are input-column slugs.
                filename: { type: string, minLength: 1, maxLength: 255 }
                matchColumns: { type: array, items: { type: string }, minItems: 1 }
                enrich: { type: boolean, default: true }
                reenrichUpdated: { type: boolean, default: false }
                batchId: { type: string, format: uuid }
      responses:
        '201':
          description: The upsert receipt — an `enrichment_run` reference with per-outcome counts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertReceipt' }
        '200':
          description: Idempotent replay of an existing `batchId` (same receipt shape).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpsertReceipt' }
        '400': { description: 'VALIDATION_ERROR — bad base64 / undecodable or empty CSV.' }
        '413':
          description: TOO_MANY_ROWS — the CSV exceeds 100 data rows; details carry `{ rows, limit }`.
        '404': { description: TABLE_NOT_FOUND. }
  /tables/{tableId}/cancel:
    parameters:
      - $ref: '#/components/parameters/TableId'
    post:
      tags: [Workspace]
      summary: Stop active cell work for a table (the API "stop" button)
      description: |
        Cancel every active (waiting / queued / running) `cell_run` for the
        table — the API equivalent of the in-app "stop" button. Running cells
        finish their in-flight execution but skip further work once they observe
        the cancelled status; sent history is never touched.

        - Omit `columns` to stop the whole table; a full-table stop **also**
          cancels active lead-source jobs.
        - Pass `columns` (an array of **column slugs** from
          `GET /tables/{tableId}/columns` → `columns[].slug`) to scope the stop
          to those columns only. A column scope deliberately leaves lead-source
          jobs running (they are table-wide, not per-column). An unknown slug →
          `UNKNOWN_COLUMN`; an empty array → `VALIDATION_ERROR`.
        - `dryRun: true` reports how much is active right now
          (`{ dryRun, tableId, activeCells, activeLeadSourceJobs }`) with zero
          writes — the "what's running?" probe. `activeCells` respects the
          `columns` scope; `activeLeadSourceJobs` is always the table-wide count
          (lead-source jobs aren't per-column), so a scoped dry-run still tells
          you the truth about table activity.

        This stops enrichment/score/sequence-drafting cell runs. To halt an
        already-launched outreach use `POST /sequences/{sequenceId}/stop` (one
        recipient) or `POST /campaigns/{campaignId}/pause` (the whole
        campaign).
      operationId: cancelTableCells
      x-mint:
        href: /agents/reference/cancel-table-cells
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                columns:
                  type: array
                  items: { type: string, minLength: 1, pattern: '\S' }
                  minItems: 1
                  description: Column slugs to scope the stop to. Omit to stop every column.
                dryRun: { type: boolean, default: false }
      responses:
        '200': { description: '{ tableId, cancelledCells, cancelledLeadSourceJobs } — or the dryRun report.' }
        '400': { description: 'VALIDATION_ERROR / UNKNOWN_COLUMN.' }
        '404': { description: TABLE_NOT_FOUND. }
        '500': { description: 'CANCEL_PARTIALLY_FAILED — one leg failed; details carry the partial cancelledCells/cancelledLeadSourceJobs + failures[].' }
  /tables/{tableId}/rows/{rowId}:
    parameters:
      - $ref: '#/components/parameters/TableId'
      - $ref: '#/components/parameters/RowId'
    get:
      tags: [Workspace]
      summary: Fetch one row
      operationId: getRow
      x-mint:
        href: /agents/reference/get-row
      responses:
        '200':
          description: The Row object with typed cells keyed by column slug.
