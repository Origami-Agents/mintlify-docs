          description: The document detail with inline content.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentDetail' }
        '404': { description: DOCUMENT_NOT_FOUND. }
    patch:
      tags: [Workspace]
      summary: Rename a document
      description: |
        DB-only rename — re-slugs the basename from `name` while preserving
        the directory prefix and extension; the document id is stable. A
        collision with another live document at the derived path →
        `409 DOCUMENT_PATH_TAKEN`.
      operationId: renameWorkspaceDocument
      x-mint:
        href: /agents/reference/rename-document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '200':
          description: The renamed document summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentSummary' }
        '404': { description: DOCUMENT_NOT_FOUND. }
        '409': { description: DOCUMENT_PATH_TAKEN. }
    delete:
      tags: [Workspace]
      summary: Delete a workspace document
      operationId: deleteWorkspaceDocument
      x-mint:
        href: /agents/reference/delete-document
      responses:
        '200': { description: '{ documentId, deleted: true }.' }
        '404': { description: DOCUMENT_NOT_FOUND. }
  /workspaces/{workspaceId}/documents/{documentId}/rename:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/DocumentId'
    post:
      deprecated: true
      tags: [Workspace]
      summary: 'Legacy alias: rename a document (use PATCH .../documents/{documentId})'
      description: |
        Deprecated alias for
        `PATCH /workspaces/{workspaceId}/documents/{documentId}` — identical
        body and responses.
      operationId: renameWorkspaceDocumentLegacy
      x-mint:
