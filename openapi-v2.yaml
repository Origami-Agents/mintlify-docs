openapi: 3.1.0
info:
  title: Origami Agent API
  version: "2.0"
  description: |
    The Origami **v2 API** is the single canonical public surface,
    organized into five segments — **Projects** (tenancy), **Agents**,
    **Workspace**, **Outreach** (campaigns, sequences, steps), and
    **Account**. Drive AI workers from a prompt, read and write table
    data (rows, cells, upsert, enrichment runs), manage documents and
    workspaces, control the sequencer and campaigns, run recurring
    scheduled agents, and read account/credit state.

    **Objects are self-describing** (Stripe-style): every object in a
    response carries an `object` field naming its type (`"agent"`,
    `"run"`, `"table"`, `"campaign"`, ...), and every list endpoint
    returns the one list envelope
    `{ "object": "list", "items": [...], "nextCursor": string|null, "url": string }`.

    **v1 is deprecated** (still fully functional — no removal date in
    this release). New integrations should target v2 only. See the
    [v1 → v2 migration guide](./api-v1-to-v2-migration) for the route
    map; in short:

    | v1 | v2 |
    | --- | --- |
    | `GET /tables` | `GET /api/v2/tables` |
    | `GET /tables/:id/rows` | `GET /api/v2/tables/:tableId/rows` |
    | `POST /tables/:id/rows` (insert) | `POST /api/v2/tables/:tableId/rows/upsert` (upsert; no bare insert) |
    | `GET /batches/:id` | `GET /api/v2/enrichment-runs/:runId` (`GET /api/v2/batches/:batchId` remains a deprecated alias) |
    | `GET /credits` | `GET /api/v2/account/credits` |

    Errors use the canonical envelope `{ error, code, details?, handoff? }`;
    any 4xx the user can fix in-app carries a forwardable `handoff` link.

    ## Tenancy — parent-wide keys & the `x-origami-project` header

    Every API key is **parent-wide**: bound to the parent (agency)
    organization and able to act on the parent and any of its
    **projects** (child orgs). Send the
    **`x-origami-project: <projectId>`** header on any v2 request to
    scope it to that project — all org-scoped resources (workspaces,
    tables, agents, outreach) then operate inside the project. Omit the
    header to act on the parent. Two exceptions: `/projects/*` manages
    the projects themselves from the parent (the header is ignored
    there, never rejected), and `/account` is always parent-scoped.

    The header fails closed: a malformed id →
    `400 VALIDATION_ERROR`; an unknown, cross-parent, or deleted
    project → `404 PROJECT_NOT_FOUND`. The plan gate
    (`canUseApi`) and request-rate limits stay keyed to the parent, and
    the concurrent-agent pool is shared across the whole parent.
    Credits spent inside a project draw on the parent's shared wallet,
    subject to the project's optional `monthlyCredits` budget cap.

    ## Transport — async by default

    `POST /agents` and `POST /agents/:id/runs` respond `202 Accepted`
    with the initial run object (`status: "running"`) as soon as the
    run is admitted. The actual agent work runs in the background.
    Callers poll `GET /agents/:id/runs/:runId` until `status !==
    "running"` to read the terminal state.

    Every endpoint returns plain `application/json`. There is no
    NDJSON, no heartbeats, no `tail -1`, no pre-stream vs in-stream
    error branches. Closing the HTTP socket has no effect on the run
    — there is no `abortOnDisconnect` knob.

    SDKs hide the polling — `await origami.agents.create({ prompt })`
    returns the final terminal `Run` object. Direct REST consumers
    poll `GET /agents/:id/runs/:runId` and honor the `Retry-After`
    header it returns while the run is still `running` (currently
    `15` seconds). The header is omitted on terminal responses —
    that absence is the signal to stop polling. Runs typically take
    1–5 minutes; polling faster than the hint does not make a run
    finish sooner.

    ## Pagination — cursor only

    Every list endpoint takes the same parameter pair — `limit`
    (default 50, max 100; row queries allow up to 200) and `cursor`
    (opaque; pass back the previous page's `nextCursor`) — and returns
    the one envelope `{ object: "list", items, nextCursor, url }`.
    `nextCursor: null` marks the last page. There is no
    `page`/`pageSize` and no `offset`. Per-endpoint filters (e.g.
    `?search=`, `?status=`, `?enabled=`) compose with `cursor`/`limit`.

    ## Idempotency

    Any `POST` may send an **`Idempotency-Key`** header (1–255
    printable ASCII chars). The first response for a key is recorded
    and replayed verbatim for retries with the same key + request for
    24 hours; replayed responses carry the `Idempotency-Replay: true`
    header. Reusing a key with a *different* method/path/body — or
    racing a still-in-flight original — is `409 IDEMPOTENCY_ERROR`.
    Row upserts additionally dedup on the body `batchId`
    (domain-level idempotency, independent of transport retries).

    ## Rate limits

    Same layers as v1: **per IP** (300 req/min) and **per organization**
    (100 req/min). The real scarce resource for agent runs is the
    per-org concurrent-agent slot — see `CONCURRENT_LIMIT_EXCEEDED`.

    | Scope | Limit |
    |-------|-------|
    | Per client IP | **300 requests / minute** |
    | Per organization | **100 requests / minute** |
    | Concurrent runs (per organization) | **plan-tunable** (1 on starter, 3 on pro, 10 on scale, 20 on ultra, unlimited on enterprise) |

    Rate-limit headers (`X-RateLimit-Limit-{IP|Global}`,
    `X-RateLimit-Remaining-*`, `X-RateLimit-Reset-*`) and `Retry-After`
    are inherited from v1.

    ## Plan-tier policy

    Agent-loop knobs (`maxSteps`, `timeoutSeconds`) are **not** request
    parameters — they're internal config gated by the plan tier. The
    chat agent's intrinsic 20-minute `AGENT_TIMEOUT_MS` is the wall-
    clock ceiling.

    | Plan | Default model | Available models | internal maxSteps |
    | --- | --- | --- | --- |
    | `starter` | `origami-lite` | `origami-lite` | 30 |
    | `pro` | `origami-max` | `origami-lite`, `origami-max` | 50 |
    | `scale` | `origami-max` | `origami-lite`, `origami-max` | 75 |
    | `ultra` | `origami-max` | `origami-lite`, `origami-max` | 100 |
    | `enterprise` | `origami-max` | `origami-lite`, `origami-max` | 200 |

    ## Errors

    All error codes are `UPPERCASE_SNAKE_CASE` and live on `code`. The
    response body always has `error` (human-readable) and `code`;
    error-specific fields (e.g. `creditsRequired`, `topUpUrl`,
    `currentRun`, `activeSessions`) live alongside at the top level
    when they're stable parts of the contract.

    Non-`completed` terminal *run* states (`timed_out`, `errored`,
    `cancelled`, `needs_input`, `step_cap_hit`) are surfaced on the
    `Run` object's single `status` field — not as HTTP error codes.
    Callers branch on the run object.

    Notable codes beyond the per-endpoint ones: `IDEMPOTENCY_ERROR`
    (409 — `Idempotency-Key` reused with a different request, or the
    original is still in flight), `TOO_MANY_ROWS` (413 — a CSV upsert
    exceeds the 100-row per-request cap), `CAMPAIGN_NOT_FOUND` (404 —
    missing or cross-org campaign id), `SEQUENCE_NOT_FOUND` (404 —
    missing or cross-org sequence id), and `PROJECT_NOT_FOUND` (404 —
    the `x-origami-project` header names an unknown, cross-parent, or
    deleted project).

    ## Webhooks

    Sequencer events fan out via HTTPS POSTs you configure in
    **Settings → Developers → Webhooks**. See the
    [webhooks reference](/webhooks/overview) and the machine-readable
    [openapi-webhooks.yaml](/openapi-webhooks.yaml) spec for working
    receiver scaffolding.

servers:
  - url: https://origami.chat/api/v2
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Projects
    description: Projects (child orgs) under the parent org — list, get, create, update, delete. Managed from the parent; the `x-origami-project` header is ignored on these paths.
  - name: Agents
    description: Create, list, and archive AI workers (a.k.a. agents).
  - name: Runs
    description: Send prompts to an agent, poll status, and cancel.
  - name: Tables
    description: Read table state and lifetime credit cost.
  - name: Workspace
    description: Workspaces, tables, columns, rows, cells, enrichment runs, and documents.
  - name: Campaigns
    description: First-class outreach campaigns — list, get, read people + stats, create + edit (agentic), launch/pause/resume, delete.
  - name: Sequences
    description: Read per-recipient sequences (with steps inline), stop and delete them. Content edits go through the agentic campaign edit.
  - name: Scheduled agents
    description: Recurring agents (cron) — CRUD, enable/disable, trigger, run history.
  - name: Account
    description: Org account state — plan, capabilities, credit balance.

paths:
  /agents:
    post:
      x-mint:
        href: /agents/reference/create-agent
      tags: [Agents]
      summary: Create an agent and admit its first run
      description: |
        Creates a new agent (and, if `workspaceId` is null and no
        `focusTableIds` are passed, an auto-created workspace), inserts
        a synthetic user message carrying the prompt, claims the
        per-org concurrent slot, and spawns the agent work in the
        background. Responds `202 Accepted` with the initial run
        object (`status: "running"`). Poll
        `GET /agents/{id}/runs/{runId}` until `status !== "running"`.
      operationId: createAgentAndRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '202':
          description: Run admitted; agent work is in the background.
          content:
            application/json:
              schema:
                type: object
                required: [agent, run, workspace]
                properties:
                  agent: { $ref: '#/components/schemas/AgentSummary' }
                  run: { $ref: '#/components/schemas/Run' }
                  workspace:
                    type: object
                    required: [object, id, name, createdAt, createdByApi]
                    properties:
                      object: { type: string, const: workspace }
                      id: { type: string, format: uuid }
                      name: { type: string }
                      createdAt: { type: string, format: date-time }
                      createdByApi:
                        type: boolean
                        description: True when the server auto-created this workspace for the agent. False when the caller supplied `workspaceId`.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientCredits'
        '403':
          description: Workspace limit reached while auto-creating an API workspace.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorEnvelope'
                  - example:
                      error: Workspace limit reached (10/10). Pass an existing workspaceId or upgrade your plan.
                      code: WORKSPACE_LIMIT_REACHED
        '429':
          $ref: '#/components/responses/ConcurrentLimit'
    get:
      tags: [Agents]
      summary: List agents (cursor-paginated; ?search=)
      operationId: listAgents
      x-mint:
        href: /agents/reference/list-agents
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: search
          description: Case-insensitive substring match on the agent name.
          schema: { type: string }
      responses:
        '200':
          description: A page of agents in the canonical list envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Agent' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/{id}:
    parameters:
      - $ref: '#/components/parameters/AgentId'
    get:
      tags: [Agents]
      summary: Get an agent
      operationId: getAgent
      x-mint:
        href: /agents/reference/get-agent
      responses:
        '200':
          description: The agent and its last run summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404':
          $ref: '#/components/responses/AgentNotFound'
    delete:
      tags: [Agents]
      summary: Archive an agent (soft-delete)
      description: |
        Soft-deletes the agent. **If the agent's auto-created workspace
        has no other active agents**, the workspace is also
        soft-deleted in the same transaction. Hand-supplied workspaces
        (those passed in `workspaceId` on create) are never
        auto-deleted.
      operationId: archiveAgent
      x-mint:
        href: /agents/reference/archive-agent
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                type: object
                required: [agent, workspace]
                properties:
                  agent:
                    type: object
                    required: [object, id, deletedAt]
                    properties:
                      object: { type: string, const: agent }
                      id: { type: string, format: uuid }
                      deletedAt: { type: string, format: date-time }
                  workspace:
                    type: object
                    required: [object, id, deletedAt]
                    properties:
                      object: { type: string, const: workspace }
                      id: { type: string, format: uuid }
                      deletedAt:
                        type: string
                        format: date-time
                        nullable: true
                        description: |
                          ISO timestamp when the workspace cascade-deleted
                          along with the agent, or `null` when it was
                          preserved (hand-supplied, or still has other
                          active agents). Only auto-created workspaces are
                          ever cascade-deleted.
        '404':
          $ref: '#/components/responses/AgentNotFound'

  /agents/{id}/runs:
    parameters:
      - $ref: '#/components/parameters/AgentId'
    post:
      x-mint:
        href: /agents/reference/send-run
      tags: [Runs]
      summary: Send a follow-up run
      description: |
        Admits a new run on an existing agent. Same agent, same
        workspace, same conversation context. Responds `202 Accepted`
        with the initial run object; agent work runs in the
        background. Use this to answer a `needs_input` question — the
        agent picks up from the prior conversation.
      operationId: sendRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendRunRequest' }
      responses:
        '202':
          description: Run admitted; agent work is in the background.
          content:
            application/json:
              schema:
                type: object
                required: [run]
                properties:
                  run: { $ref: '#/components/schemas/Run' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '402':
          $ref: '#/components/responses/InsufficientCredits'
        '404':
          $ref: '#/components/responses/AgentNotFound'
        '409':
          $ref: '#/components/responses/AgentBusy'
        '429':
          $ref: '#/components/responses/ConcurrentLimit'
    get:
      tags: [Runs]
      summary: List runs for an agent (cursor-paginated)
      operationId: listRuns
      x-mint:
        href: /agents/reference/list-runs
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of run summaries in the canonical list envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/RunSummary' }
        '404':
          $ref: '#/components/responses/AgentNotFound'

  /agents/{id}/runs/{runId}:
    parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/RunId'
    get:
      x-mint:
        href: /agents/reference/get-run
      tags: [Runs]
      summary: Get a run (poll for status / final result)
      description: |
        Returns the run object. Works while the run is still running
        (`status: "running"` with partial `actions[]`) and after it
        terminates. This is the primary read path — every call after
        `POST /agents` polls this endpoint until `status !== "running"`.
      operationId: getRun
      parameters:
        - in: query
          name: include
          description: |
            CSV-style list of opt-in projections. Recognized tokens:
              - `stats` — embed table economics on every
                `response.tables[]` entry (per-table + per-column).
              - `transcript` — return the full public transcript on
                `response.transcript`.
            Combine: `?include=stats,transcript`. Unknown tokens are
            ignored.
          schema:
            type: string
            example: stats,transcript
      responses:
        '200':
          description: The run object
          headers:
            Retry-After:
              schema: { type: integer }
              description: |
                Poll-pacing hint in seconds, present ONLY while the run
                is non-terminal (`status: "running"`) — currently `15`.
                Honor it as the canonical poll cadence. Omitted on
                terminal responses; that absence is the signal to stop
                polling.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '404':
          $ref: '#/components/responses/RunNotFound'

  /agents/{id}/tables:
    parameters:
      - $ref: '#/components/parameters/AgentId'
    get:
      tags: [Tables]
      summary: List tables in the agent's workspace
      description: |
        The fallback discovery surface in v2. The run object only
        carries `response.tables[]` for tables a specific run
        *touched* (empty when the run made no mutations or stopped on
        a question), so callers that need "every table this agent has
        access to" use this endpoint instead.

        Each entry is a full TableObject — same shape as
        `GET /api/v2/tables/{id}` and the same shape embedded under
        `Run.response.tables[]`. Pass `?include=stats` to attach the
        economics block (per-table + per-column).

        Scoped to the agent's own workspace; a caller cannot probe
        arbitrary workspaces through this path. Returned in the
        canonical list envelope with `nextCursor` always `null` — an
        agent's workspace is rarely more than a handful of tables, so
        the endpoint does not paginate.
      operationId: listAgentTables
      x-mint:
        href: /agents/reference/list-agent-tables
      parameters:
        - in: query
          name: include
          description: |
            Pass `stats` to attach per-table economics on every entry
            (creditsPerLead, qualification, funnel, lead sources).
          schema:
            type: string
            example: stats
      responses:
        '200':
          description: Tables in the agent's workspace (list envelope + `workspaceId`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items, workspaceId]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Table' }
                      workspaceId: { type: string, format: uuid }
        '404':
          $ref: '#/components/responses/AgentNotFound'

  /tables/{tableId}:
    parameters:
      - $ref: '#/components/parameters/TableId'
    get:
      x-mint:
        href: /agents/reference/get-table
      tags: [Tables]
      summary: Get a table — name, leadCount, columns, credits, optional economics
      description: |
        The canonical "what's in this table and what did it cost?"
        surface in v2. Same shape as the entries in
        `Run.response.tables[]` and `GET /agents/{id}/tables`.

        Default shape is lite — `leadCount`, `columns[]` with
        per-column `credits.lifetimeUsed`, table-level
        `credits.lifetimeUsed` (sum of the column breakdown). Pass
        `?include=stats` to attach the economics block — the same
        numbers the UI shows at the top of the table
        (creditsPerLead, qualification breakdown, funnel, lead
        sources, ...).

        `credits.lifetimeUsed` accumulates across every agent run
        that ever populated cells on this table — it is the unit a
        human thinks in when they ask how much a list cost. It does
        NOT include still-active cell-run reservations; wait for the
        relevant run to terminate before reading the final number.

        Scoped to the API key's org. There is no API-owned filter on
        tables, so any non-deleted table in your org is fetchable.
        For programmatic row reads, use
        [`GET /api/v2/tables/{tableId}/rows`](https://origami.chat/reading-data).
      operationId: getTable
      parameters:
        - in: query
          name: include
          description: |
            Pass `stats` to attach the economics block (creditsPerLead,
            qualification, funnel, lead sources) plus per-column `stats`
            and `qualification`.
          schema:
            type: string
            example: stats
      responses:
        '200':
          description: The table object
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Table' }
        '404':
          description: Table not found in this org (or soft-deleted)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorEnvelope'
                  - example:
                      error: Table not found
                      code: TABLE_NOT_FOUND

  /agents/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/AgentId'
    post:
      x-mint:
        href: /agents/reference/cancel-run
      tags: [Runs]
      summary: Cancel the agent's currently-active run (idempotent, cooperative)
      description: |
        The per-agent mutex guarantees at most one in-flight run per
        agent, so cancel takes only the agentId. Wraps the same
        machinery the UI's stop route uses (`markCancelling` + Redis
        `cancelStream` publish).

        Idempotent: returns `200` whether the agent has an active
        run, is already cancelling, or has no in-flight run at all.
        The response body always carries the latest run object — the
        just-cancelled one if there was one, otherwise the agent's
        most recent terminal run.
      operationId: cancelActiveRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: |
            The (possibly updated) run object, or `{ "run": null }`
            when the agent has never had a run.
          content:
            application/json:
              schema:
                type: object
                required: [run]
                properties:
                  run:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/AgentNotFound'

  # ── Workspace segment ────────────────────────────────────────────
  /workspaces:
    get:
      tags: [Workspace]
      summary: List workspaces (cursor-paginated; ?search=)
      operationId: listWorkspaces
      x-mint:
        href: /agents/reference/list-workspaces
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: search
          description: Case-insensitive substring match on the workspace name.
          schema: { type: string }
      responses:
        '200':
          description: A page of workspaces in the canonical list envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Workspace' }
    post:
      tags: [Workspace]
      summary: Bootstrap a workspace (upload-first flows)
      operationId: createWorkspace
      x-mint:
        href: /agents/reference/create-workspace
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 80 }
      responses:
        '201':
          description: The created workspace.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '403': { description: WORKSPACE_LIMIT_REACHED (carries an upgrade-plan handoff). }
  /workspaces/{workspaceId}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Workspace]
      summary: Fetch a workspace
      operationId: getWorkspace
      x-mint:
        href: /agents/reference/get-workspace
      responses:
        '200':
          description: The workspace object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '404': { description: WORKSPACE_NOT_FOUND. }
    delete:
      tags: [Workspace]
      summary: Delete a workspace (two-step; ?confirm=true)
      description: |
        Permanently deletes a workspace and its entire entity tree (tables,
        rows, cells, sequences, chat history, documents). Follows the v2
        deletes convention — deliberately **two-step** so it can't fire on a
        single ambiguous instruction:

        1. Call **without** `?confirm=true` → **no deletion**. Returns HTTP
           200 with the impact preview
           `{ workspaceId, name, confirmationRequired: true, willDelete: { tables, rows } }`.
           The caller is expected to check with the user before proceeding.
        2. After the user agrees, retry with `?confirm=true` → performs the
           cascade soft-delete and returns `{ workspaceId, name, deleted: true }`.

        A missing / cross-org / already-deleted workspace returns
        `404 WORKSPACE_NOT_FOUND`.
      operationId: deleteWorkspaceRest
      x-mint:
        href: /agents/reference/delete-workspace
      parameters:
        - in: query
          name: confirm
          description: Must be `true` to actually delete. Omit for the impact preview.
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: The impact preview (unconfirmed) or the delete receipt (confirmed).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WorkspaceDeletePreview'
                  - type: object
                    required: [workspaceId, name, deleted]
                    properties:
                      workspaceId: { type: string, format: uuid }
                      name: { type: string }
                      deleted: { type: boolean, const: true }
        '404': { description: WORKSPACE_NOT_FOUND. }
  /workspaces/{workspaceId}/delete:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    post:
      deprecated: true
      tags: [Workspace]
      summary: 'Legacy alias: delete a workspace (body-confirm protocol)'
      description: |
        Deprecated alias for `DELETE /workspaces/{workspaceId}`. Keeps the
        original body-confirm protocol: with `confirm` omitted/false it
        returns `409 CONFIRMATION_REQUIRED` whose `details` carry the
        workspace name and the `willDelete: { tables, rows }` impact preview;
        the `{ "confirm": true }` retry performs the delete and returns
        `{ workspaceId, name, deleted: true }`.
      operationId: deleteWorkspace
      x-mint:
        href: /agents/reference/delete-workspace-legacy
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                confirm:
                  type: boolean
                  default: false
                  description: Must be true to actually delete. Omit/false to get the confirmation preview.
      responses:
        '200': { description: '{ workspaceId, name, deleted: true } — workspace deleted.' }
        '409': { description: 'CONFIRMATION_REQUIRED — details carry name + willDelete preview; retry with { confirm: true }.' }
        '404': { description: WORKSPACE_NOT_FOUND. }
  /workspaces/{workspaceId}/documents:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Workspace]
      summary: List workspace-scoped documents (cursor-paginated)
      operationId: listWorkspaceDocuments
      x-mint:
        href: /agents/reference/list-documents
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of document summaries in the canonical list envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DocumentSummary' }
        '404': { description: WORKSPACE_NOT_FOUND. }
    post:
      tags: [Workspace]
      summary: Upload files into a workspace (the single ingest verb)
      description: |
        The one ingest path for every file type — base64 file bytes inside
        JSON (no multipart). CSVs become new tables (`mode: "table"`, the
        default for `.csv`), append into an existing table (`mode: "append"`
        + `tableId`), or store as documents (`mode: "document"`); any other
        extension is stored as a document. Preflight validation is
        all-or-nothing: the whole request is rejected (count cap, per-file
        mode/extension/append-target) before any file is ingested. Per-file
        ingestion can still fail after preflight — the response is `201` when
        at least one file landed and `422 UPLOAD_FAILED` when every file
        errored. Replaces the deprecated
        `POST /workspaces/{workspaceId}/uploads` spelling (same contract).
      operationId: uploadWorkspaceDocuments
      x-mint:
        href: /agents/reference/upload-documents
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadFilesRequest' }
      responses:
        '201': { description: 'Per-file ingest results ({ results: [...] }); individual entries may be kind: "error".' }
        '400': { description: 'VALIDATION_ERROR / INVALID_UPLOAD_MODE.' }
        '404': { description: 'WORKSPACE_NOT_FOUND / TABLE_NOT_FOUND (append target).' }
        '413': { description: TOO_MANY_FILES — over the per-request file cap. }
        '422': { description: UPLOAD_FAILED — every file errored; details carry the per-file results. }
  /workspaces/{workspaceId}/uploads:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    post:
      deprecated: true
      tags: [Workspace]
      summary: 'Legacy alias: upload files (use POST /workspaces/{workspaceId}/documents)'
      description: |
        Deprecated alias for `POST /workspaces/{workspaceId}/documents` —
        identical body and responses.
      operationId: uploadWorkspaceFilesLegacy
      x-mint:
        href: /agents/reference/upload-documents-legacy
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadFilesRequest' }
      responses:
        '201': { description: 'Per-file ingest results ({ results: [...] }).' }
        '413': { description: TOO_MANY_FILES. }
        '422': { description: UPLOAD_FAILED. }
  /workspaces/{workspaceId}/documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/DocumentId'
    get:
      tags: [Workspace]
      summary: Read a document (metadata + content)
      operationId: getWorkspaceDocument
      x-mint:
