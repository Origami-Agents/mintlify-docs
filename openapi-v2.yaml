                      items:
                        type: array
                        items: { $ref: '#/components/schemas/EnrichmentRun' }
        '404': { description: TABLE_NOT_FOUND. }
  /batches:
    get:
      deprecated: true
      tags: [Workspace]
      summary: 'Legacy alias: list enrichment runs (use GET /enrichment-runs)'
      description: Deprecated alias for `GET /enrichment-runs` — identical parameters and response.
      operationId: listBatches
      x-mint:
        href: /agents/reference/list-batches
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
